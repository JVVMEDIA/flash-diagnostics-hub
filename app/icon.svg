<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Flash Diagnostics Hub">
  <defs>
    <linearGradient id="fd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="8" fill="#09090b"/>

  <circle cx="16" cy="16" r="12" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="9;14;9" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="16" cy="16" r="11" fill="none" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="4 8" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur="6s" repeatCount="indefinite"/>
  </circle>

  <rect x="5" y="5" width="22" height="22" rx="6" fill="url(#fd-bg)" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.88;1" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <text
    x="16"
    y="17.5"
    text-anchor="middle"
    font-family="system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="11"
    font-weight="700"
    fill="#09090b"
  >FD</text>
</svg>