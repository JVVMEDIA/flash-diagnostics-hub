<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Flash Diagnostics Hub">
  <defs>
    <linearGradient id="hub-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="8" fill="#09090b"/>

  <circle cx="16" cy="16" r="13" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.45">
    <animate attributeName="r" values="10;14.5;10" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.65;0.12;0.65" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <rect x="4" y="4" width="24" height="24" rx="7" fill="url(#hub-bg)" filter="url(#soft-glow)"/>

  <path fill="url(#bolt)" d="M17.2 6.5 11 15.2h4.1L12.8 25.5l9.2-11.4h-4.3l.5-7.6z"/>

  <path fill="none" stroke="#ecfdf5" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"
    d="M8 22.5 Q11 20.5 14 22.5 T20 22.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/>
  </path>

  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#6ee7b7" stroke-width="0.8" stroke-dasharray="3 7" opacity="0.55">
    <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>